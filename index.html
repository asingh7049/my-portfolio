<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arvin Singh | Personal Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
            overflow: hidden;
            position: relative;
        }

        /* Animated background elements */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: move 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.4);
            border-radius: 50%;
        }

        .blob-2 {
            bottom: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: rgba(139, 92, 246, 0.3);
            border-radius: 50%;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 50px) scale(1.1); }
        }

        .card {
            background-color: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3.5rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            color: white;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }
        
        .profile-img:hover {
            transform: scale(1.05) rotate(5deg);
        }

        h1 {
            font-size: 2.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1.15rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            flex-wrap: wrap;
        }

        .social-link {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            padding: 0.75rem 1.75rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .social-link:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.8);
            color: white;
        }
        
        @media (max-width: 640px) {
            .card {
                padding: 2.5rem 1.5rem;
            }
            h1 {
                font-size: 2.25rem;
            }
            .social-links {
                gap: 1rem;
            }
            .social-link {
                padding: 0.75rem 1.25rem;
            }
        }

        .border-ball {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 20px 8px var(--accent);
            z-index: 100;
            pointer-events: none;
            animation: moveAroundBorder 8s linear infinite;
        }

        @keyframes moveAroundBorder {
            0%   { top: 0; left: 0; transform: translate(0, 0); }
            25%  { top: 0; left: 100%; transform: translate(-100%, 0); }
            50%  { top: 100%; left: 100%; transform: translate(-100%, -100%); }
            75%  { top: 100%; left: 0; transform: translate(0, -100%); }
            100% { top: 0; left: 0; transform: translate(0, 0); }
        }
    </style>
</head>
<body>
    <div class="border-ball"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="card">
        <div class="profile-img">AS</div>
        <h1>Arvin Singh</h1>
        <h2>Software Engineer & Creator</h2>
        <p>I'm exploring the intersection of technology and design, building intuitive and dynamic experiences on the web.</p>
        
        <div class="social-links">
            <a href="#" class="social-link">GitHub</a>
            <a href="https://www.linkedin.com/in/arvin-singh-43706a344/" class="social-link" target="_blank">LinkedIn</a>
            <a href="#" class="social-link">Twitter</a>
        </div>
    </div>
</body>
</html>
